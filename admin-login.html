<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Sign In — Taj Al Sukun</title>
<link rel="icon" type="image/png" href="assets/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="admin-login">

<div class="admin-login__card">
  <span class="logo-frame"><img src="assets/images/logo.png" alt="Taj Al Sukun" loading="lazy" decoding="async"></span>
  <h1>Admin Console</h1>
  <p class="sub">Sign in to manage memberships and bookings.</p>

  <form id="admin-login-form">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="admin@tasukunspa.com" autocomplete="username" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>
    <div class="auth-error" id="login-error" hidden style="margin-top:14px;">
      <i class="fas fa-exclamation-circle"></i>
      <span>Invalid credentials. Please try again.</span>
    </div>
    <div class="field" style="margin-top: 22px;">
      <button type="submit" class="btn btn--primary btn--block" id="login-btn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
    </div>
  </form>

  <div class="demo" id="demo-box" hidden>
    <strong style="display:block; color: var(--c-deep); margin-bottom: 6px; letter-spacing: 0.18em; font-size: 0.7rem; text-transform: uppercase;">Demo Access (offline mode)</strong>
    Email: <code>admin@tasukunspa.com</code><br>
    Password: <code>taj-admin</code>
  </div>

  <p style="font-size: 0.82rem; color: var(--c-text-soft); margin-top: 22px;">
    <a href="index.html" style="color: var(--c-copper); font-weight: 500;">← Back to website</a>
  </p>
</div>

<!-- Supabase + config + auth -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="assets/js/supabase-config.js?v=20260520e" defer></script>
<script src="assets/js/admin-auth.js?v=20260520e" defer></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('admin-login-form');
  const errEl = document.getElementById('login-error');
  const btn  = document.getElementById('login-btn');

  // Show demo hint only when Supabase is NOT configured
  if (!(window.TajAdmin && window.TajAdmin.isSupabase)) {
    document.getElementById('demo-box').hidden = false;
  }

  // If already signed in, skip straight to the console
  (async () => {
    if (window.TajAdmin && await TajAdmin.session()) location.replace('admin.html');
  })();

  form.addEventListener('submit', async e => {
    e.preventDefault();
    errEl.hidden = true;
    const fd = new FormData(form);
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

    const res = await (window.TajAdmin
      ? TajAdmin.signIn(fd.get('email'), fd.get('password'))
      : Promise.resolve({ ok: false, error: 'Auth not loaded — please reload.' }));

    btn.disabled = false;
    btn.innerHTML = orig;

    if (res.ok) {
      btn.innerHTML = '<i class="fas fa-check"></i> Welcome';
      location.href = 'admin.html';
    } else {
      const msg = errEl.querySelector('span');
      if (msg) msg.textContent = res.error || 'Invalid credentials. Please try again.';
      errEl.hidden = false;
    }
  });
});
</script>
</body>
</html>
